<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>pi workflow 插件分层总图 — Architecture Preview</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: rgba(255,255,255,0.86);
      --panel-solid: #ffffff;
      --border: rgba(20, 28, 45, 0.10);
      --text: #0f172a;
      --muted: #667085;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37,99,235,0.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(16,185,129,0.10), transparent 25%),
        var(--bg);
      min-height: 100vh;
    }
    .app { display: flex; flex-direction: column; min-height: 100vh; }
    .topbar {
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.78);
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .topbar h1 { margin: 0 0 4px; font-size: 22px; line-height: 1.15; }
    .subtitle {
      color: var(--muted);
      max-width: 1200px;
      line-height: 1.45;
      font-size: 14px;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 1;
      overflow: hidden;
    }
    .meta-row { display: flex; flex-wrap: wrap; gap: 8px 10px; align-items: center; margin-top: 10px; }
    .chip, .tab {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.88);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--text);
    }
    .tab { cursor: pointer; }
    .tab.active { background: #0f172a; color: white; border-color: #0f172a; }
    .controls {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      margin-top: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
    }
    .controls::-webkit-scrollbar,
    .highlights::-webkit-scrollbar { display: none; }
    button, a.button-link {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      background: var(--panel-solid);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      font-size: 13px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.03);
    }
    button:hover, a.button-link:hover { border-color: rgba(37,99,235,0.35); }
    .main { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 18px; padding: 18px 20px 24px; flex: 1; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .viewport { position: relative; overflow: hidden; min-height: 740px; }
    .canvas-wrap { position: absolute; inset: 0; overflow: hidden; cursor: grab; }
    .canvas-wrap.dragging { cursor: grabbing; }
    .canvas { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(15,23,42,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15,23,42,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .node {
      position: absolute;
      width: 210px;
      min-height: 72px;
      padding: 14px 14px 12px;
      border-radius: 18px;
      border: 2px solid transparent;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
    }
    .node:hover { transform: translateY(-2px); box-shadow: 0 14px 30px rgba(15, 23, 42, 0.10); }
    .node.active { border-color: #1d4ed8 !important; box-shadow: 0 16px 34px rgba(37,99,235,0.22); }
    .node-label { font-weight: 700; font-size: 15px; line-height: 1.3; margin-bottom: 8px; }
    .node-type { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .annotation {
      position: absolute;
      width: 220px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(15,23,42,0.10);
      color: #334155;
      font-size: 12px;
      line-height: 1.45;
      box-shadow: 0 10px 22px rgba(15,23,42,0.06);
    }
    .annotation.top { transform: translate(-5px, -104%); }
    .annotation.bottom { transform: translate(-5px, calc(100% - 10px)); }
    .annotation.left { transform: translate(-100%, -4px); margin-left: -18px; }
    .annotation.right { transform: translate(100%, -4px); margin-left: 18px; }
    .loop-box {
      position: absolute;
      border: 2px dashed rgba(226,93,93,0.55);
      border-radius: 24px;
      background: rgba(255,245,245,0.38);
      pointer-events: none;
    }
    .loop-label {
      position: absolute;
      top: -14px;
      left: 18px;
      background: rgba(255,255,255,0.96);
      color: #b42318;
      border: 1px solid rgba(180,35,24,0.16);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .details { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .details h2 { margin: 0; font-size: 22px; }
    .details .section {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,0.78);
      padding: 14px 15px;
    }
    .section h3 { margin: 0 0 8px; font-size: 14px; }
    .section p, .section li { color: #334155; line-height: 1.55; font-size: 14px; }
    ul { margin: 0; padding-left: 18px; }
    .highlights {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      margin-top: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
    }
    .highlight {
      flex: 0 0 auto;
      white-space: nowrap;
      background: rgba(37,99,235,0.08);
      color: #1d4ed8;
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
    }
    .legend { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #334155; }
    .swatch { width: 14px; height: 14px; border-radius: 999px; border: 1px solid rgba(15,23,42,0.12); }
    .presentation .details { font-size: 1.05em; }
    .presentation .node-label { font-size: 17px; }
    .presentation .annotation { font-size: 13px; }
    @media (max-width: 1200px) {
      .main { grid-template-columns: 1fr; }
      .viewport { min-height: 680px; }
    }
    @media (max-width: 720px) {
      .topbar {
        padding: 10px 12px 8px;
      }
      .topbar h1 {
        font-size: 18px;
        margin-bottom: 2px;
      }
      .subtitle {
        font-size: 12px;
      }
      #generatedAt,
      #prdLink,
      #presentationMode,
      #reset,
      .highlights {
        display: none;
      }
      .meta-row {
        margin-top: 8px;
        gap: 6px 8px;
      }
      .chip, .tab {
        padding: 5px 9px;
        font-size: 11px;
      }
      .controls {
        margin-top: 8px;
      }
      button, a.button-link {
        padding: 7px 9px;
        font-size: 12px;
      }
      .main {
        gap: 10px;
        padding: 10px 10px 16px;
      }
      .viewport {
        min-height: 540px;
      }
      .details {
        padding: 16px;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1 id="projectTitle"></h1>
      <div class="subtitle" id="projectSummary"></div>
      <div class="meta-row" id="stageTabs"></div>
      <div class="meta-row">
        <span class="chip" id="generatedAt"></span>
        <span class="chip" id="currentStageChip"></span>
      </div>
      <div class="controls">
        <button id="zoomIn">放大</button>
        <button id="zoomOut">缩小</button>
        <button id="fit">适配屏幕</button>
        <button id="reset">重置</button>
        <button id="presentationMode">演示模式</button>
        <a class="button-link" id="prdLink" target="_blank" rel="noreferrer">打开 PRD</a>
      </div>
      <div class="highlights" id="stageHighlights"></div>
    </header>
    <main class="main">
      <section class="panel viewport">
        <div class="canvas-wrap" id="canvasWrap">
          <div class="grid"></div>
          <div class="canvas" id="canvas"></div>
        </div>
      </section>
      <aside class="panel details" id="detailsPanel"></aside>
    </main>
  </div>

  <script>
    const DIAGRAM = {"project_title": "pi workflow 插件分层总图", "project_summary": "先只看边界：它本质上是一个文件驱动的串行 workflow runtime。命令层发起动作，workflow-engine 编排执行，workflow/ 目录保存真实状态，isolated worker 执行单节点，UI 只负责展示与人工干预。", "generated_at": "2026-03-20T03:55:00+08:00", "stages": [{"id": "layered-overview", "label": "总图", "title": "分层架构总图", "description": "这一版故意不讲执行细节、不讲状态细项，只讲系统边界和责任分工。阅读顺序：从左到右看主路径，从上到下看辅助关系。", "highlights": ["它是串行 phase runner，不是通用 DAG 调度器", "workflow/ 文件层才是真实状态来源", "UI 是投影层，不是事实来源", "单节点由隔离 pi worker 执行"], "nodes": [{"id": "commands", "label": "用户命令层", "type": "input", "col": 0.2, "row": 2.2, "annotation": "用户通过 /wf-run、/wf-next、/wf-approve、/wf-retry、/wf-restart、/wf-board 与系统交互。这里只负责发起动作，不负责真正编排。", "annotation_pos": "top", "details": {"outputs": ["run", "next", "approve", "retry", "restart", "focus / board"]}, "x": 146.0, "y": 431.0, "style": {"bg": "#f7f7f5", "border": "#cccccc"}}, {"id": "engine", "label": "workflow-engine.ts\n编排核心层", "type": "agent", "col": 2.3, "row": 2.2, "annotation": "唯一的大脑。负责初始化 scaffold、读取状态、选择当前 job、准备 worker 输入、回收结果、更新状态并刷新 UI。", "annotation_pos": "top", "details": {"inputs": ["命令动作", "workflow 定义", "运行时状态", "worker 输出"], "outputs": ["worker 执行请求", "状态更新", "UI 刷新"]}, "x": 629.0, "y": 431.0, "style": {"bg": "#FFF8E7", "border": "#E8C85B"}}, {"id": "definition", "label": "定义层\nspec.json + input.json", "type": "storage", "col": 2.3, "row": 0.6, "annotation": "告诉引擎这条 workflow 是什么、有哪些 phase、每个 phase 用什么 skill、输入输出产物是什么。", "annotation_pos": "right", "details": {"outputs": ["workflow_type", "phases", "prompt_template", "workflow_input"]}, "x": 629.0, "y": 183.0, "style": {"bg": "#F3EEFA", "border": "#B497D6"}}, {"id": "state", "label": "文件状态层\nstate / jobs / vars / artifacts", "type": "storage", "col": 4.6, "row": 2.2, "annotation": "真正的事实来源。state.json 管全局状态，job.json 管单节点，vars.json 管变量池，artifacts 管阶段产物。", "annotation_pos": "top", "details": {"inputs": ["engine 写入", "worker 产物"], "outputs": ["selected_job", "job status", "$node*", "phase artifacts"]}, "x": 1158.0, "y": 431.0, "style": {"bg": "#F3EEFA", "border": "#B497D6"}}, {"id": "worker", "label": "isolated pi worker\n单节点执行层", "type": "agent", "col": 6.9, "row": 2.2, "annotation": "每次只执行一个节点，运行在独立 pi 会话里，不继承当前长对话上下文，只依赖 workflow 文件和 skill。", "annotation_pos": "top", "details": {"inputs": ["prompt.md", "input.json", "skill path"], "outputs": ["output.json", "output.md", "main artifact"]}, "x": 1687.0, "y": 431.0, "style": {"bg": "#FFF8E7", "border": "#E8C85B"}}, {"id": "ui", "label": "展示层\nstatus / widget / wf-board", "type": "output", "col": 4.6, "row": 4.1, "annotation": "负责把 workflow 文件状态投影给人看，并支持 focus / approve / retry / restart 等人工干预动作。", "annotation_pos": "top", "details": {"inputs": ["state.json", "job.json", "artifact preview"], "outputs": ["可视化状态", "人工操作"]}, "x": 1158.0, "y": 725.5, "style": {"bg": "#EDFCF2", "border": "#6FCF97"}}, {"id": "note", "label": "系统定位", "type": "strategy", "col": 6.9, "row": 0.6, "annotation": "这套系统当前更像“有状态的串行 phase runner”，不是支持并行拓扑求解的 DAG 调度器。先把边界认清，图就不会乱。", "annotation_pos": "bottom", "details": {"notes": ["适合线性多阶段任务", "支持审批门", "支持失败重试 / 重启", "暂不强调并行调度"]}, "x": 1687.0, "y": 183.0, "style": {"bg": "#FFF3E8", "border": "#E8A864"}}], "edges": [{"from": "commands", "to": "engine", "color": "blue", "label": "发起动作"}, {"from": "definition", "to": "engine", "color": "purple", "label": "提供流程定义"}, {"from": "engine", "to": "state", "color": "purple", "label": "读写运行时状态"}, {"from": "state", "to": "engine", "color": "purple", "label": "提供当前上下文"}, {"from": "engine", "to": "worker", "color": "red", "label": "派发单节点执行"}, {"from": "worker", "to": "state", "color": "green", "label": "写回产物与结果"}, {"from": "state", "to": "ui", "color": "blue", "label": "投影状态"}, {"from": "ui", "to": "engine", "color": "blue", "label": "人工干预"}, {"from": "note", "to": "worker", "color": "gray", "label": "边界提醒"}], "loops": [], "canvas_width": 2257, "canvas_height": 977}]};
    const EDGE_COLORS = {"blue": "#4A90D9", "yellow": "#D4A843", "green": "#5BAE7C", "red": "#E25D5D", "gray": "#A0A0A0", "purple": "#8B6FC0"};
    const PRD_NAME = "overview-notes.md";

    const canvasWrap = document.getElementById('canvasWrap');
    const canvas = document.getElementById('canvas');
    const detailsPanel = document.getElementById('detailsPanel');
    const stageTabs = document.getElementById('stageTabs');
    const projectTitle = document.getElementById('projectTitle');
    const projectSummary = document.getElementById('projectSummary');
    const generatedAt = document.getElementById('generatedAt');
    const currentStageChip = document.getElementById('currentStageChip');
    const stageHighlights = document.getElementById('stageHighlights');
    const prdLink = document.getElementById('prdLink');

    let activeStageIndex = 0;
    let activeNodeId = null;
    let scale = 1;
    let offsetX = 24;
    let offsetY = 24;
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    function safeList(values) {
      if (!values) return [];
      if (Array.isArray(values)) return values.filter(Boolean);
      return [String(values)];
    }

    function renderTabs() {
      stageTabs.innerHTML = '';
      DIAGRAM.stages.forEach((stage, index) => {
        const button = document.createElement('button');
        button.className = 'tab' + (index === activeStageIndex ? ' active' : '');
        button.textContent = stage.label || stage.title || `Stage ${index + 1}`;
        button.addEventListener('click', () => {
          activeStageIndex = index;
          activeNodeId = null;
          renderTabs();
          renderStage();
        });
        stageTabs.appendChild(button);
      });
    }

    function linePoint(node, side) {
      const x = node.x;
      const y = node.y;
      const centerX = x + 105.0;
      const centerY = y + 36.0;
      if (side === 'left') return [x, centerY];
      if (side === 'right') return [x + 210, centerY];
      if (side === 'top') return [centerX, y];
      return [centerX, y + 72];
    }

    function choosePorts(source, target) {
      const dx = target.x - source.x;
      const dy = target.y - source.y;
      if (Math.abs(dx) >= Math.abs(dy)) {
        return dx >= 0 ? ['right', 'left'] : ['left', 'right'];
      }
      return dy >= 0 ? ['bottom', 'top'] : ['top', 'bottom'];
    }

    function edgePath(source, target) {
      const [fromSide, toSide] = choosePorts(source, target);
      const [x1, y1] = linePoint(source, fromSide);
      const [x2, y2] = linePoint(target, toSide);
      const midX = (x1 + x2) / 2;
      return `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`;
    }

    function renderStageHighlights(stage) {
      stageHighlights.innerHTML = '';
      (stage.highlights || []).forEach(text => {
        const chip = document.createElement('span');
        chip.className = 'highlight';
        chip.textContent = text;
        stageHighlights.appendChild(chip);
      });
    }

    function renderStage() {
      const stage = DIAGRAM.stages[activeStageIndex];
      projectTitle.textContent = DIAGRAM.project_title || 'Architecture Preview';
      projectSummary.textContent = DIAGRAM.project_summary || '';
      generatedAt.textContent = `生成时间：${DIAGRAM.generated_at || ''}`;
      currentStageChip.textContent = `当前阶段：${stage.label || stage.title || ''}`;
      renderStageHighlights(stage);

      canvas.innerHTML = '';
      canvas.style.width = `${stage.canvas_width}px`;
      canvas.style.height = `${stage.canvas_height}px`;

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', stage.canvas_width);
      svg.setAttribute('height', stage.canvas_height);
      svg.style.position = 'absolute';
      svg.style.left = '0';
      svg.style.top = '0';
      svg.style.overflow = 'visible';

      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      Object.entries(EDGE_COLORS).forEach(([key, color]) => {
        const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
        marker.setAttribute('id', `arrow-${key}`);
        marker.setAttribute('markerWidth', '10');
        marker.setAttribute('markerHeight', '10');
        marker.setAttribute('refX', '9');
        marker.setAttribute('refY', '3');
        marker.setAttribute('orient', 'auto');
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', 'M0,0 L0,6 L9,3 z');
        path.setAttribute('fill', color);
        marker.appendChild(path);
        defs.appendChild(marker);
      });
      svg.appendChild(defs);
      canvas.appendChild(svg);

      const nodesById = Object.fromEntries(stage.nodes.map(node => [node.id, node]));

      (stage.loops || []).forEach(loop => {
        const box = document.createElement('div');
        box.className = 'loop-box';
        box.style.left = `${100 + (loop.x1 || 0) * GRID_X}px`;
        box.style.top = `${90 + (loop.y1 || 0) * GRID_Y}px`;
        box.style.width = `${Math.max(((loop.x2 || 0) - (loop.x1 || 0)) * GRID_X, 160)}px`;
        box.style.height = `${Math.max(((loop.y2 || 0) - (loop.y1 || 0)) * GRID_Y, 120)}px`;
        const label = document.createElement('div');
        label.className = 'loop-label';
        label.textContent = loop.label || 'Loop';
        box.appendChild(label);
        canvas.appendChild(box);
      });

      (stage.edges || []).forEach(edge => {
        const source = nodesById[edge.from];
        const target = nodesById[edge.to];
        if (!source || !target) return;
        const color = EDGE_COLORS[edge.color] || EDGE_COLORS.blue;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', edgePath(source, target));
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', color);
        path.setAttribute('stroke-width', edge.color === 'gray' ? '2' : '3');
        path.setAttribute('stroke-linecap', 'round');
        path.setAttribute('stroke-dasharray', edge.color === 'gray' ? '7 8' : '');
        path.setAttribute('marker-end', `url(#arrow-${edge.color || 'blue'})`);
        path.setAttribute('opacity', '0.9');
        svg.appendChild(path);

        if (edge.label) {
          const [fromSide, toSide] = choosePorts(source, target);
          const [x1, y1] = linePoint(source, fromSide);
          const [x2, y2] = linePoint(target, toSide);
          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', ((x1 + x2) / 2).toString());
          label.setAttribute('y', (((y1 + y2) / 2) - 8).toString());
          label.setAttribute('fill', '#475467');
          label.setAttribute('font-size', '12');
          label.setAttribute('text-anchor', 'middle');
          label.textContent = edge.label;
          svg.appendChild(label);
        }
      });

      stage.nodes.forEach(node => {
        const card = document.createElement('div');
        card.className = 'node' + (node.id === activeNodeId ? ' active' : '');
        card.style.left = `${node.x}px`;
        card.style.top = `${node.y}px`;
        card.style.background = node.style.bg;
        card.style.borderColor = node.style.border;
        card.innerHTML = `
          <div class="node-type">${node.type || 'node'}</div>
          <div class="node-label">${node.label || node.id}</div>
        `;
        card.addEventListener('click', event => {
          event.stopPropagation();
          activeNodeId = node.id;
          renderStage();
        });
        canvas.appendChild(card);

        if (node.annotation) {
          const annotation = document.createElement('div');
          annotation.className = `annotation ${node.annotation_pos || 'top'}`;
          annotation.textContent = node.annotation;
          annotation.style.left = `${node.x}px`;
          annotation.style.top = `${node.y}px`;
          if ((node.annotation_pos || 'top') === 'right') annotation.style.left = `${node.x + 210}px`;
          if ((node.annotation_pos || 'top') === 'bottom') annotation.style.top = `${node.y + 72}px`;
          canvas.appendChild(annotation);
        }
      });

      renderDetails(stage, nodesById);
      fitToScreen();
    }

    function renderList(title, values) {
      const items = safeList(values);
      if (!items.length) return '';
      return `
        <div class="section">
          <h3>${title}</h3>
          <ul>${items.map(item => `<li>${item}</li>`).join('')}</ul>
        </div>
      `;
    }

    function renderDetails(stage, nodesById) {
      if (activeNodeId && nodesById[activeNodeId]) {
        const node = nodesById[activeNodeId];
        const details = node.details || {};
        detailsPanel.innerHTML = `
          <div>
            <h2>${node.label}</h2>
            <div class="meta-row"><span class="chip">类型：${node.type || 'node'}</span></div>
          </div>
          <div class="section">
            <h3>节点说明</h3>
            <p>${node.annotation || '该节点暂无额外说明。'}</p>
          </div>
          ${renderList('输入', details.inputs)}
          ${renderList('输出', details.outputs)}
          ${renderList('依赖', details.depends_on)}
          ${renderList('被谁使用', details.used_by)}
          ${renderList('备注', details.notes)}
        `;
        return;
      }

      detailsPanel.innerHTML = `
        <div>
          <h2>${stage.title || stage.label}</h2>
          <div class="meta-row"><span class="chip">${stage.label || ''}</span></div>
        </div>
        <div class="section">
          <h3>阶段说明</h3>
          <p>${stage.description || '暂无阶段说明。'}</p>
        </div>
        <div class="section">
          <h3>如何阅读这张图</h3>
          <p>从左到右看主流程；同列不同排通常表示并行或分支；虚线框表示循环或反复确认区；点击节点可看更完整的依赖和输入输出。</p>
        </div>
        <div class="section">
          <h3>图例</h3>
          <div class="legend">
            <div class="legend-item"><span class="swatch" style="background:#EDF6FF;border-color:#7BB8E8"></span>Skill</div>
            <div class="legend-item"><span class="swatch" style="background:#FFF8E7;border-color:#E8C85B"></span>Agent</div>
            <div class="legend-item"><span class="swatch" style="background:#FFF3E8;border-color:#E8A864"></span>Strategy</div>
            <div class="legend-item"><span class="swatch" style="background:#F3EEFA;border-color:#B497D6"></span>Storage</div>
            <div class="legend-item"><span class="swatch" style="background:#EDFCF2;border-color:#6FCF97"></span>Output</div>
            <div class="legend-item"><span class="swatch" style="background:#f7f7f5;border-color:#cccccc"></span>Input</div>
          </div>
        </div>
      `;
    }

    function applyTransform() {
      canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    }

    function fitToScreen() {
      const stage = DIAGRAM.stages[activeStageIndex];
      const availableWidth = canvasWrap.clientWidth - 36;
      const availableHeight = canvasWrap.clientHeight - 36;
      const nextScale = Math.min(1.0, availableWidth / stage.canvas_width, availableHeight / stage.canvas_height);
      scale = Math.max(nextScale, 0.45);
      offsetX = Math.max((availableWidth - stage.canvas_width * scale) / 2, 16);
      offsetY = Math.max((availableHeight - stage.canvas_height * scale) / 2, 16);
      applyTransform();
    }

    document.getElementById('zoomIn').addEventListener('click', () => { scale = Math.min(scale + 0.1, 2.2); applyTransform(); });
    document.getElementById('zoomOut').addEventListener('click', () => { scale = Math.max(scale - 0.1, 0.35); applyTransform(); });
    document.getElementById('reset').addEventListener('click', () => { scale = 1; offsetX = 24; offsetY = 24; applyTransform(); });
    document.getElementById('fit').addEventListener('click', fitToScreen);
    document.getElementById('presentationMode').addEventListener('click', () => { document.body.classList.toggle('presentation'); });

    canvasWrap.addEventListener('pointerdown', event => {
      isDragging = true;
      startX = event.clientX - offsetX;
      startY = event.clientY - offsetY;
      canvasWrap.classList.add('dragging');
    });
    window.addEventListener('pointermove', event => {
      if (!isDragging) return;
      offsetX = event.clientX - startX;
      offsetY = event.clientY - startY;
      applyTransform();
    });
    window.addEventListener('pointerup', () => {
      isDragging = false;
      canvasWrap.classList.remove('dragging');
    });
    canvasWrap.addEventListener('wheel', event => {
      event.preventDefault();
      const delta = event.deltaY < 0 ? 0.08 : -0.08;
      scale = Math.min(2.2, Math.max(0.35, scale + delta));
      applyTransform();
    }, { passive: false });
    canvas.addEventListener('click', () => { activeNodeId = null; renderStage(); });
    window.addEventListener('resize', fitToScreen);

    if (!PRD_NAME) {
      prdLink.style.display = 'none';
    } else {
      prdLink.href = PRD_NAME;
    }

    renderTabs();
    renderStage();
  </script>
</body>
</html>
