  <script>
    const DIAGRAM = {"project_title": "pi workflow 插件：业务输入驱动结构图", "project_summary": "从文章生产这个具体业务案例出发：主题/素材/受众/约束进入 workflow 后，依次经过计划、调研、初稿、审阅、终稿五个阶段；下层再解释这些业务阶段如何被 workflow-engine、文件状态层与 isolated worker 承载。", "generated_at": "2026-03-20T04:05:00+08:00", "stages": [{"id": "article-case-overview", "label": "文章案例", "title": "文章生产案例 + runtime 映射", "description": "先从业务输入看这条 workflow 想解决什么问题，再往下看这些业务阶段如何被 runtime 执行。上层是业务流，下层是系统承载层。", "highlights": ["必须从业务输入开始理解，而不是从 /wf-next 开始", "review 阶段会停在 waiting_approval，体现人工审核门", "下层 runtime 不改变业务目标，只负责把业务阶段稳定执行出来", "这条案例对应默认 article-pipeline：init → research → draft → review → final"], "nodes": [{"id": "biz_input", "label": "业务输入\n主题 / 素材 / audience / constraints", "type": "input", "col": 0.2, "row": 0.9, "annotation": "真正的起点不是命令，而是业务任务：要写什么、给谁看、受哪些约束、已有多少素材。", "annotation_pos": "top", "details": {"inputs": ["topic", "source materials", "audience", "constraints"], "outputs": ["可执行的文章任务"]}, "x": 146.0, "y": 229.5, "style": {"bg": "#f7f7f5", "border": "#cccccc"}}, {"id": "plan", "label": "init\n产出计划", "type": "strategy", "col": 1.9, "row": 0.9, "annotation": "先把任务拆清楚：这篇文章要怎么推进、后面有哪些阶段、每个阶段产出什么。", "annotation_pos": "top", "details": {"inputs": ["业务输入"], "outputs": ["plan artifact"]}, "x": 537.0, "y": 229.5, "style": {"bg": "#FFF3E8", "border": "#E8A864"}}, {"id": "research", "label": "research\n产出调研材料", "type": "skill", "col": 3.6, "row": 0.9, "annotation": "把主题相关的背景、论据、关键事实收集成 research memo，供初稿阶段消费。", "annotation_pos": "top", "details": {"inputs": ["plan artifact", "workflow input"], "outputs": ["research artifact"]}, "x": 928.0, "y": 229.5, "style": {"bg": "#EDF6FF", "border": "#7BB8E8"}}, {"id": "draft", "label": "draft\n产出初稿", "type": "skill", "col": 5.3, "row": 0.9, "annotation": "根据调研结果写出第一版正文，这一步已经开始形成用户真正关心的业务中间结果。", "annotation_pos": "top", "details": {"inputs": ["research artifact"], "outputs": ["draft artifact"]}, "x": 1319.0, "y": 229.5, "style": {"bg": "#EDF6FF", "border": "#7BB8E8"}}, {"id": "review", "label": "review\n审阅意见 + waiting_approval", "type": "strategy", "col": 7.0, "row": 0.9, "annotation": "不是直接自动出终稿，而是先产出 review artifact，并停在 waiting_approval，让人决定是否放行。", "annotation_pos": "top", "details": {"inputs": ["draft artifact"], "outputs": ["review artifact", "approval decision"]}, "x": 1710.0, "y": 229.5, "style": {"bg": "#FFF3E8", "border": "#E8A864"}}, {"id": "final", "label": "final\n可发布终稿", "type": "output", "col": 8.9, "row": 0.9, "annotation": "综合初稿与审阅意见，产出最终文章。这个节点对应用户真正要拿到的业务结果。", "annotation_pos": "top", "details": {"inputs": ["draft artifact", "review artifact", "human approval"], "outputs": ["final article"]}, "x": 2147.0, "y": 229.5, "style": {"bg": "#EDFCF2", "border": "#6FCF97"}}, {"id": "mapping", "label": "业务阶段映射\n每一步都会变成一个 workflow job", "type": "strategy", "col": 4.5, "row": 2.6, "annotation": "上面的 5 个业务阶段并不是“概念流程”而已，它们会被明确映射为 workflow 的 5 个 phase，由同一套 runtime 逐个执行。", "annotation_pos": "bottom", "details": {"outputs": ["phase list", "job order", "phase-to-artifact mapping"]}, "x": 1135.0, "y": 493.0, "style": {"bg": "#FFF3E8", "border": "#E8A864"}}, {"id": "definition", "label": "定义层\nspec.json + input.json", "type": "storage", "col": 1.8, "row": 4.4, "annotation": "把这条文章生产流程正式定义出来：phase 顺序、skill、prompt_template、输入输出产物、用户输入。", "annotation_pos": "right", "details": {"outputs": ["workflow_type", "phases", "prompt_template", "workflow_input"]}, "x": 514.0, "y": 772.0, "style": {"bg": "#F3EEFA", "border": "#B497D6"}}, {"id": "engine", "label": "workflow-engine.ts\n编排核心", "type": "agent", "col": 4.2, "row": 4.4, "annotation": "负责把上层业务阶段真正跑起来：选当前 job、准备 prompt、启动 worker、回收输出、推进下一个阶段。", "annotation_pos": "top", "details": {"inputs": ["workflow 定义", "当前状态", "上游产物"], "outputs": ["worker request", "state update", "UI refresh"]}, "x": 1066.0, "y": 772.0, "style": {"bg": "#FFF8E7", "border": "#E8C85B"}}, {"id": "state", "label": "文件状态层\nstate / jobs / vars / artifacts", "type": "storage", "col": 6.6, "row": 4.4, "annotation": "这里保存真正的运行时事实：当前跑到哪一步、每个节点状态如何、上游输出是什么、业务产物是什么。", "annotation_pos": "top", "details": {"inputs": ["engine updates", "worker outputs"], "outputs": ["selected_job", "job status", "$node*", "phase artifacts"]}, "x": 1618.0, "y": 772.0, "style": {"bg": "#F3EEFA", "border": "#B497D6"}}, {"id": "worker", "label": "isolated pi worker\n单节点执行", "type": "agent", "col": 8.9, "row": 4.4, "annotation": "每个 phase 都在独立 pi 会话里完成，只执行一个业务节点，不依赖当前长聊天上下文。", "annotation_pos": "top", "details": {"inputs": ["prompt.md", "job input", "skill path"], "outputs": ["output.json", "output.md", "artifact file"]}, "x": 2147.0, "y": 772.0, "style": {"bg": "#FFF8E7", "border": "#E8C85B"}}, {"id": "ui", "label": "展示 / 干预层\nstatus / widget / wf-board", "type": "output", "col": 6.6, "row": 6.1, "annotation": "用户最终看到的是这层：阶段状态、当前选中节点、产物预览，以及 review 阶段的人审入口。", "annotation_pos": "top", "details": {"inputs": ["state.json", "job.json", "artifact preview"], "outputs": ["status", "approve / retry / restart"]}, "x": 1618.0, "y": 1035.5, "style": {"bg": "#EDFCF2", "border": "#6FCF97"}}], "edges": [{"from": "biz_input", "to": "plan", "color": "blue", "label": "业务任务进入流程"}, {"from": "plan", "to": "research", "color": "blue", "label": "明确后续任务"}, {"from": "research", "to": "draft", "color": "blue", "label": "调研结果进入写作"}, {"from": "draft", "to": "review", "color": "blue", "label": "初稿进入审阅"}, {"from": "review", "to": "final", "color": "yellow", "label": "审批后产出终稿"}, {"from": "biz_input", "to": "definition", "color": "purple", "label": "写入 workflow input"}, {"from": "plan", "to": "mapping", "color": "gray", "label": "phase 1"}, {"from": "research", "to": "mapping", "color": "gray", "label": "phase 2"}, {"from": "draft", "to": "mapping", "color": "gray", "label": "phase 3"}, {"from": "review", "to": "mapping", "color": "gray", "label": "phase 4"}, {"from": "final", "to": "mapping", "color": "gray", "label": "phase 5"}, {"from": "mapping", "to": "engine", "color": "red", "label": "映射为 job 顺序"}, {"from": "definition", "to": "engine", "color": "purple", "label": "提供 phase 定义"}, {"from": "engine", "to": "state", "color": "purple", "label": "读写状态与产物"}, {"from": "state", "to": "engine", "color": "purple", "label": "提供当前上下文"}, {"from": "engine", "to": "worker", "color": "red", "label": "派发当前节点执行"}, {"from": "worker", "to": "state", "color": "green", "label": "写回 artifact / output"}, {"from": "state", "to": "ui", "color": "blue", "label": "投影给用户"}, {"from": "ui", "to": "engine", "color": "blue", "label": "approve / retry / restart"}], "loops": [{"label": "review 阶段的人审门", "x1": 6.6, "y1": 0.2, "x2": 8.0, "y2": 2.0}], "canvas_width": 2717, "canvas_height": 1287}]};
    const EDGE_COLORS = {"blue": "#4A90D9", "yellow": "#D4A843", "green": "#5BAE7C", "red": "#E25D5D", "gray": "#A0A0A0", "purple": "#8B6FC0"};
    const PRD_NAME = "overview-notes.md";

    const canvasWrap = document.getElementById('canvasWrap');
    const canvas = document.getElementById('canvas');
    const detailsPanel = document.getElementById('detailsPanel');
    const stageTabs = document.getElementById('stageTabs');

    const projectSummary = document.getElementById('projectSummary');

    const currentStageChip = document.getElementById('currentStageChip');
    const stageHighlights = document.getElementById('stageHighlights');

    let activeStageIndex = 0;

    let scale = 1;
    let offsetX = 24;

    function safeList(values) {
      if (!values) return [];
      if (Array.isArray(values)) return values.filter(Boolean);
      return [String(values)];
    }

    function renderTabs() {
      stageTabs.innerHTML = '';
      DIAGRAM.stages.forEach((stage, index) => {
        const button = document.createElement('button');
        button.className = 'tab' + (index === activeStageIndex ? ' active' : '');
        button.textContent = stage.label || stage.title || `Stage ${index + 1}`;
        button.addEventListener('click', () => {
          activeStageIndex = index;
          activeNodeId = null;
          renderTabs();
          renderStage();
        });
        stageTabs.appendChild(button);
      });
    }

    function linePoint(node, side) {
      const x = node.x;
      const y = node.y;
      const centerX = x + 105.0;
      const centerY = y + 36.0;
      if (side === 'left') return [x, centerY];
      if (side === 'right') return [x + 210, centerY];
      if (side === 'top') return [centerX, y];
      return [centerX, y + 72];
    }

    function choosePorts(source, target) {
      const dx = target.x - source.x;
      const dy = target.y - source.y;
      if (Math.abs(dx) >= Math.abs(dy)) {
        return dx >= 0 ? ['right', 'left'] : ['left', 'right'];
      }
      return dy >= 0 ? ['bottom', 'top'] : ['top', 'bottom'];
    }

    function edgePath(source, target) {
      const [fromSide, toSide] = choosePorts(source, target);
      const [x1, y1] = linePoint(source, fromSide);
      const [x2, y2] = linePoint(target, toSide);
      const midX = (x1 + x2) / 2;
      return `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`;
    }

      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      Object.entries(EDGE_COLORS).forEach(([key, color]) => {

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', 'M0,0 L0,6 L9,3 z');
        path.setAttribute('fill', color);
        marker.appendChild(path);
        defs.appendChild(marker);
      });
      svg.appendChild(defs);
      canvas.appendChild(svg);

      const nodesById = Object.fromEntries(stage.nodes.map(node => [node.id, node]));

      (stage.loops || []).forEach(loop => {
        const box = document.createElement('div');
        box.className = 'loop-box';
        box.style.left = `${100 + (loop.x1 || 0) * GRID_X}px`;
        box.style.top = `${90 + (loop.y1 || 0) * GRID_Y}px`;
        box.style.width = `${Math.max(((loop.x2 || 0) - (loop.x1 || 0)) * GRID_X, 160)}px`;
        box.style.height = `${Math.max(((loop.y2 || 0) - (loop.y1 || 0)) * GRID_Y, 120)}px`;
        const label = document.createElement('div');
        label.className = 'loop-label';
        label.textContent = loop.label || 'Loop';
        box.appendChild(label);
        canvas.appendChild(box);
      });

      (stage.edges || []).forEach(edge => {
        const source = nodesById[edge.from];
        const target = nodesById[edge.to];
        if (!source || !target) return;
        const color = EDGE_COLORS[edge.color] || EDGE_COLORS.blue;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', edgePath(source, target));
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', color);
        path.setAttribute('stroke-width', edge.color === 'gray' ? '2' : '3');
        path.setAttribute('stroke-linecap', 'round');
        path.setAttribute('stroke-dasharray', edge.color === 'gray' ? '7 8' : '');
        path.setAttribute('marker-end', `url(#arrow-${edge.color || 'blue'})`);
        path.setAttribute('opacity', '0.9');
        svg.appendChild(path);

        if (edge.label) {
          const [fromSide, toSide] = choosePorts(source, target);
          const [x1, y1] = linePoint(source, fromSide);
          const [x2, y2] = linePoint(target, toSide);
          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', ((x1 + x2) / 2).toString());
          label.setAttribute('y', (((y1 + y2) / 2) - 8).toString());
          label.setAttribute('fill', '#475467');
          label.setAttribute('font-size', '12');
          label.setAttribute('text-anchor', 'middle');
          label.textContent = edge.label;
          svg.appendChild(label);
        }
      });

      stage.nodes.forEach(node => {
        const card = document.createElement('div');
        card.className = 'node' + (node.id === activeNodeId ? ' active' : '');
        card.style.left = `${node.x}px`;
        card.style.top = `${node.y}px`;
        card.style.background = node.style.bg;
        card.style.borderColor = node.style.border;
        card.innerHTML = `
          <div class="node-type">${node.type || 'node'}</div>
          <div class="node-label">${node.label || node.id}</div>
        `;
        card.addEventListener('click', event => {
          event.stopPropagation();
          activeNodeId = node.id;
          renderStage();
        });
        canvas.appendChild(card);

        if (node.annotation) {
          const annotation = document.createElement('div');
          annotation.className = `annotation ${node.annotation_pos || 'top'}`;
          annotation.textContent = node.annotation;
          annotation.style.left = `${node.x}px`;
          annotation.style.top = `${node.y}px`;
          if ((node.annotation_pos || 'top') === 'right') annotation.style.left = `${node.x + 210}px`;
          if ((node.annotation_pos || 'top') === 'bottom') annotation.style.top = `${node.y + 72}px`;
          canvas.appendChild(annotation);
        }
      });

      renderDetails(stage, nodesById);
      fitToScreen();
    }

    function renderList(title, values) {
      const items = safeList(values);
      if (!items.length) return '';
      return `
        <div class="section">
          <h3>${title}</h3>
          <ul>${items.map(item => `<li>${item}</li>`).join('')}</ul>
        </div>
      `;
    }

    function renderDetails(stage, nodesById) {
      if (activeNodeId && nodesById[activeNodeId]) {
        const node = nodesById[activeNodeId];
        const details = node.details || {};
        detailsPanel.innerHTML = `
          <div>
            <h2>${node.label}</h2>
            <div class="meta-row"><span class="chip">类型：${node.type || 'node'}</span></div>
          </div>
          <div class="section">
            <h3>节点说明</h3>
            <p>${node.annotation || '该节点暂无额外说明。'}</p>
          </div>
          ${renderList('输入', details.inputs)}
          ${renderList('输出', details.outputs)}
          ${renderList('依赖', details.depends_on)}
          ${renderList('被谁使用', details.used_by)}
          ${renderList('备注', details.notes)}
        `;
        return;
      }

      detailsPanel.innerHTML = `
        <div>
          <h2>${stage.title || stage.label}</h2>
          <div class="meta-row"><span class="chip">${stage.label || ''}</span></div>
        </div>
        <div class="section">
          <h3>阶段说明</h3>
          <p>${stage.description || '暂无阶段说明。'}</p>
        </div>
        <div class="section">
          <h3>如何阅读这张图</h3>
          <p>从左到右看主流程；同列不同排通常表示并行或分支；虚线框表示循环或反复确认区；点击节点可看更完整的依赖和输入输出。</p>
        </div>
        <div class="section">
          <h3>图例</h3>
          <div class="legend">
            <div class="legend-item"><span class="swatch" style="background:#EDF6FF;border-color:#7BB8E8"></span>Skill</div>
            <div class="legend-item"><span class="swatch" style="background:#FFF8E7;border-color:#E8C85B"></span>Agent</div>
            <div class="legend-item"><span class="swatch" style="background:#FFF3E8;border-color:#E8A864"></span>Strategy</div>
            <div class="legend-item"><span class="swatch" style="background:#F3EEFA;border-color:#B497D6"></span>Storage</div>
            <div class="legend-item"><span class="swatch" style="background:#EDFCF2;border-color:#6FCF97"></span>Output</div>
            <div class="legend-item"><span class="swatch" style="background:#f7f7f5;border-color:#cccccc"></span>Input</div>
          </div>
        </div>
      `;
    }

    function applyTransform() {
      canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    }

    function fitToScreen() {
      const stage = DIAGRAM.stages[activeStageIndex];
      const availableWidth = canvasWrap.clientWidth - 36;
      const availableHeight = canvasWrap.clientHeight - 36;
      const nextScale = Math.min(1.0, availableWidth / stage.canvas_width, availableHeight / stage.canvas_height);
      scale = Math.max(nextScale, 0.45);
      offsetX = Math.max((availableWidth - stage.canvas_width * scale) / 2, 16);
      offsetY = Math.max((availableHeight - stage.canvas_height * scale) / 2, 16);
      applyTransform();
    }

    document.getElementById('zoomIn').addEventListener('click', () => { scale = Math.min(scale + 0.1, 2.2); applyTransform(); });
    document.getElementById('zoomOut').addEventListener('click', () => { scale = Math.max(scale - 0.1, 0.35); applyTransform(); });
    document.getElementById('reset').addEventListener('click', () => { scale = 1; offsetX = 24; offsetY = 24; applyTransform(); });
    document.getElementById('fit').addEventListener('click', fitToScreen);
    document.getElementById('presentationMode').addEventListener('click', () => { document.body.classList.toggle('presentation'); });

    canvasWrap.addEventListener('pointerdown', event => {
      isDragging = true;
      startX = event.clientX - offsetX;
      startY = event.clientY - offsetY;
      canvasWrap.classList.add('dragging');
    });
    window.addEventListener('pointermove', event => {
      if (!isDragging) return;
      offsetX = event.clientX - startX;
      offsetY = event.clientY - startY;
      applyTransform();
    });
    window.addEventListener('pointerup', () => {
      isDragging = false;
      canvasWrap.classList.remove('dragging');
    });
    canvasWrap.addEventListener('wheel', event => {
      event.preventDefault();
      const delta = event.deltaY < 0 ? 0.08 : -0.08;
      scale = Math.min(2.2, Math.max(0.35, scale + delta));
      applyTransform();
    }, { passive: false });
    canvas.addEventListener('click', () => { activeNodeId = null; renderStage(); });
    window.addEventListener('resize', fitToScreen);

    if (!PRD_NAME) {
      prdLink.style.display = 'none';
    } else {
      prdLink.href = PRD_NAME;
    }

    renderTabs();
    renderStage();
  </script>
</body>
</html>
